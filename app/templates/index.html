<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comet API</title>
    <link
      rel="icon"
      type="image/png"
      href="https://fastapi.tiangolo.com/img/favicon.png"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #0f1419;
      }
      .container {
        background: rgba(30, 41, 51, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem 4rem 4rem 4rem;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        text-align: center;
        max-width: 600px;
        width: 90%;
      }
      h1 {
        color: #ffffff;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 2rem;
      }
      p {
        color: #b8c5d0;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      a {
        display: block;
        padding: 1rem 2rem;
        background: #6ee7b7;
        color: #0f1419;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      a:hover {
        background: #5cd3a3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(110, 231, 183, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 Welcome to the Comet API!</h1>
      <p>Choose your preferred documentation format:</p>
      <div class="links">
        <a href="/docs">📘 Swagger UI</a>
        <a href="/redoc">📗 ReDoc</a>
      </div>
    </div>
  </body>
</html>
